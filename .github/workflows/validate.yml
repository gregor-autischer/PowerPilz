name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build HACS bundle
        run: npm run build:hacs
        # NOTE: we intentionally do not verify that the committed root
        # `power-pilz.js` matches this fresh build. HACS users download the
        # release asset that the Production Release workflow attaches —
        # so the committed tree bundle is not on any user's install path.
        # Keeping the build step catches real build/type errors without
        # failing CI on harmless source/bundle drift during day-to-day
        # development. The production build is re-run on every release.

  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HACS metadata
        uses: hacs/action@main
        with:
          category: plugin
